<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centered Hello World</title>
    <style>
        /* The body acts as a flexible container covering the full screen */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Centers horizontally */
            align-items: center;     /* Centers vertically */
            height: 100vh;           /* Takes up 100% of the viewport height */
            background-color: #f0f2f5; /* A light grey background color */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Styling for the text container */
        .card {
            text-align: center;
            padding: 20px 40px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333333;
            margin: 0;
            font-size: 2.5rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World!</h1>
    </div>

</body>
</html>
